<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Koleksi Foto & Video</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 900px;
        margin: 0 auto;
        padding: 20px;
        background-color: #f4f4f9;
      }
      .katalog-container {
        display: flex;
        flex-wrap: wrap;
        gap: 25px;
        justify-content: center;
        padding: 20px 0;
      }

      /* Gaya Baru untuk Card */
      .card {
        background-color: #ffffff;
        border-radius: 12px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        width: 280px;
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }
      .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
      }
      .card img {
        width: 100%;
        height: 200px;
        object-fit: cover; /* Memastikan gambar tidak herot */
        cursor: pointer;
        display: block;
      }
      .card-body {
        padding: 20px;
        text-align: center;
      }
      .card-body h3 {
        margin: 0 0 10px 0;
        cursor: pointer;
        color: #0070f3;
        font-size: 1.2em;
      }

      .detail-box {
        margin-top: 15px;
        font-size: 0.9em;
        color: #444;
        display: none;
        background: #f0f4f8;
        padding: 12px;
        border-radius: 6px;
        text-align: left;
      }
      .source-badge {
        font-size: 0.7em;
        font-weight: bold;
        color: white;
        background: #e00;
        padding: 4px 8px;
        border-radius: 4px;
        display: inline-block;
        margin-top: 10px;
      }
      .source-redis {
        background: #0070f3;
      }
      footer {
        margin-top: 40px;
        border-top: 2px solid #ddd;
        padding-top: 20px;
        text-align: center;
        font-family: monospace;
        color: #555;
      }
    </style>
  </head>
  <body>
    <h1 style="text-align: center; color: #333">Koleksi Seni</h1>
    <p style="text-align: center; font-size: 0.9em; color: gray">
      *Klik gambar atau judul untuk melihat butiran koleksi
    </p>

    <div id="katalog" class="katalog-container">
      <p>Memuatkan koleksi...</p>
    </div>

    <footer id="fortune-footer">
      <p>Memuatkan Fortune...</p>
    </footer>

    <script>
      // 1. Mengambil data katalog awal (get-koleksi)
      fetch("/api/get-koleksi")
        .then((res) => res.json())
        .then((response) => {
          const katalogDiv = document.getElementById("katalog");
          katalogDiv.innerHTML = ""; // Bersihkan tulisan loading

          response.data.forEach((item) => {
            const el = document.createElement("div");
            el.className = "card"; // Menggunakan class card
            el.innerHTML = `
                <img src="${item.path}" alt="${item.judul}" onclick="tampilkanDetail(${item.id})">
                <div class="card-body">
                    <h3 onclick="tampilkanDetail(${item.id})">${item.judul}</h3>
                    <div id="detail-${item.id}" class="detail-box">Memuatkan butiran...</div>
                </div>
            `;
            katalogDiv.appendChild(el);
          });
        })
        .catch((err) => console.error("Ralat memuatkan katalog:", err));

      // 2. Fungsi saat gambar/judul diklik (get-detail)
      function tampilkanDetail(id) {
        const detailBox = document.getElementById(`detail-${id}`);

        // Toggle tutup/buka
        if (detailBox.style.display === "block") {
          detailBox.style.display = "none";
          return;
        }

        detailBox.style.display = "block";
        detailBox.innerHTML = "Memuatkan butiran...";

        fetch(`/api/get-detail?id=${id}`)
          .then((res) => res.json())
          .then((response) => {
            const dt = response.data;
            const warnaBadge =
              response.source === "REDIS" ? "source-redis" : "";

            detailBox.innerHTML = `
                        <strong>Pencipta:</strong> ${dt.pencipta} <br>
                        <strong>Tahun:</strong> ${dt.tahun} <br>
                        <strong>Harga:</strong> Rp${dt.harga.toLocaleString("id-ID")} <br>
                        <span class="source-badge ${warnaBadge}">${response.source}</span>
                    `;
          })
          .catch((err) => {
            detailBox.innerHTML = "Gagal memuatkan butiran.";
          });
      }

      // 3. Memuat output Fortune (Serverless & Edge) beserta waktu responsnya
      const footer = document.getElementById("fortune-footer");

      async function fetchFortune() {
        try {
          // Hitung waktu pemrosesan Edge Function
          const startEdge = performance.now();
          const resEdge = await fetch("/api/fortune-edge");
          const dataEdge = await resEdge.json();
          const timeEdge = Math.round(performance.now() - startEdge);

          // Hitung waktu pemrosesan Serverless biasa
          const startReg = performance.now();
          const resReg = await fetch("/api/fortune");
          const dataReg = await resReg.json();
          const timeReg = Math.round(performance.now() - startReg);

          footer.innerHTML = `
                    <p><strong>Edge:</strong> ${dataEdge.fortune} (${timeEdge}ms)</p>
                    <p><strong>Backend:</strong> ${dataReg.fortune} (${timeReg}ms)</p>
                `;
        } catch (err) {
          footer.innerHTML = "<p>Gagal memuatkan fungsi Fortune.</p>";
        }
      }
      fetchFortune();
    </script>
  </body>
</html>
